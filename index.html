<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Chatroom</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-card { width: 95%; max-width: 400px; height: 85vh; background: #1e293b; display: flex; flex-direction: column; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .chat-header { background: #2563eb; padding: 16px; text-align: center; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #0f172a; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .message .sender { font-size: 0.75rem; font-weight: bold; color: #38bdf8; display: block; margin-bottom: 4px; }
        .message.mine { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.theirs { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input { display: flex; padding: 12px; background: #1e293b; gap: 8px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #475569; border-radius: 30px; background: #0f172a; color: white; outline: none; font-size: 0.95rem; }
        input:focus { border-color: #2563eb; }
        button { background: #2563eb; border: none; padding: 0 22px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        #setup-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #0f172a; display:flex; justify-content:center; align-items:center; z-index: 100; }
        .setup-box { background: #1e293b; padding: 30px; border-radius: 16px; text-align: center; border: 1px solid #334155; width: 90%; max-width: 340px; }
        .setup-box h3 { margin-bottom: 10px; }
        .setup-box input { width: 100%; margin: 15px 0; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-box">
            <h3>Join Chatroom</h3>
            <p style="color: #94a3b8; font-size: 0.85rem;">Enter your name to start</p>
            <input type="text" id="name-field" placeholder="Your Name..." maxlength="15" onkeypress="if(event.key==='Enter') initChat()">
            <button onclick="initChat()" style="padding: 12px 24px; width: 100%;">Enter Room</button>
        </div>
    </div>

    <div class="chat-card">
        <div class="chat-header">⚡ Squad Chatroom</div>
        <div class="chat-messages" id="chat-box"></div>
        <div class="chat-input">
            <input type="text" id="text-field" placeholder="Type a message..." onkeypress="if(event.key==='Enter') pushMsg()">
            <button onclick="pushMsg()">Send</button>
        </div>
    </div>

    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script>
        let myUser = "";
        let pubnub;
        const ROOM_CHANNEL = "squad_global_chat_2026"; 

        function initChat() {
            const name = document.getElementById('name-field').value.trim();
            if(!name) return;
            myUser = name;
            document.getElementById('setup-overlay').style.display = 'none';

            pubnub = new PubNub({
                publishKey: 'demo', 
                subscribeKey: 'demo',
                userId: myUser
            });

            // DATABASE: Fetch last 50 past messages from the storage vault when joining
            pubnub.history({
                channel: ROOM_CHANNEL,
                count: 50,
                stringifiedTimeToken: true
            }, function (status, response) {
                if (response && response.messages) {
                    response.messages.forEach(msg => {
                        renderMessage(msg.entry.user, msg.entry.text);
                    });
                }
            });

            // Listen for any new messages coming in live
            pubnub.addListener({
                message: function(event) {
                    renderMessage(event.message.user, event.message.text);
                }
            });

            pubnub.subscribe({ channels: [ROOM_CHANNEL] });
        }

        function pushMsg() {
            const input = document.getElementById('text-field');
            const messageText = input.value.trim();
            if(!messageText) return;

            pubnub.publish({
                channel: ROOM_CHANNEL,
                message: { user: myUser, text: messageText }
            });
            input.value = '';
        }

        function renderMessage(sender, text) {
            const box = document.getElementById('chat-box');
            const el = document.createElement('div');
            const isMe = sender === myUser;
            
            el.className = `message ${isMe ? 'mine' : 'theirs'}`;
            el.innerHTML = `<span class="sender">${isMe ? 'You' : sender}</span>${escapeText(text)}`;
            
            box.appendChild(el);
            box.scrollTop = box.scrollHeight; 
        }

        function escapeText(str) {
            return str.replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c] || c));
        }
    </script>
</body>
</html>
